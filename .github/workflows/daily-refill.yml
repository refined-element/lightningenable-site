name: Daily Demo Refill

# Why this exists:
#   The live demo at demo.lightningenable.com drains sats from a
#   small CoinOS NWC wallet on every "Run the agent" click. Sats
#   accumulate in the OPPOSITE direction in the demo merchant's
#   OpenNode account (each demo run pays the LE merchant — which is
#   the operator's own account). Left alone, CoinOS empties and
#   OpenNode fills; eventually demo flow breaks until manually
#   refilled.
#
#   This workflow closes the loop daily: hit the /api/demo-refill
#   endpoint, which moves a fixed small amount (200 sats by default)
#   from OpenNode back to CoinOS via a Lightning withdrawal to the
#   operator's CoinOS Lightning address.
#
# Why 11:30 UTC:
#   30 min before the daily smoke test (12:00 UTC), so a fresh refill
#   is in place when the smoke validates the agent flow. Order
#   matters: smoke-after-refill means the smoke catches a refill
#   failure indirectly (wallet didn't get topped up → smoke fails on
#   INSUFFICIENT_BALANCE), in addition to this workflow surfacing
#   the refill failure directly.
#
# Skipped vs failed:
#   The endpoint returns ok:true with skipped:true when the OpenNode
#   balance is too low to cover the refill — that's the normal
#   "system at rest with nothing to move" state during idle periods
#   and is NOT alertable. The workflow treats skipped:true as success
#   and just logs the reason.
#
# Failure handling:
#   Any other non-200 response, or a network error before HTTP, is
#   treated as a real failure. The workflow opens (or comments on) a
#   GitHub Issue via the `gh` CLI — same pattern as the smoke test
#   workflow — so notifications reach the operator regardless of
#   GitHub's default cron-failure email behavior. Most likely
#   actually-alertable failure modes:
#     - OPENNODE_WITHDRAWAL_API_KEY revoked or wrong scope
#     - CoinOS LNURL-pay endpoint structurally broken (extended outage)
#     - DEMO_REFILL_ADMIN_KEY mismatch between this workflow's secret
#       and the Vercel env var

on:
  schedule:
    - cron: '30 11 * * *'  # 11:30 UTC daily
  workflow_dispatch:
    # Manual fire-now button in the Actions UI — useful for testing
    # the wiring after first setup, or when the wallet ran dry between
    # scheduled refills.

permissions:
  contents: read
  issues: write  # required for the failure-notification step below

jobs:
  refill:
    name: Refill demo wallet from OpenNode → CoinOS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/demo-refill
        env:
          ADMIN_KEY: ${{ secrets.DEMO_REFILL_ADMIN_KEY }}
        run: |
          # NOTE: deliberately NOT using `set -euo pipefail` here —
          # `pipefail` would cause the curl-with-pipe-into-tee pattern
          # below to abort the whole step on a non-2xx response,
          # before our explicit check can categorize it. We check
          # `${http_status}` ourselves and `exit 1` only on real
          # failures.
          set -u

          if [ -z "${ADMIN_KEY:-}" ]; then
            echo "::error::DEMO_REFILL_ADMIN_KEY secret is not set on this repo. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          # Write response body to a temp file, capture HTTP status
          # via curl's --write-out. This avoids the prior pattern of
          # appending `HTTP_STATUS:%{http_code}` to the body and
          # parsing it back out with sed — fragile if the body
          # itself happens to contain "HTTP_STATUS:" verbatim.
          body_file=$(mktemp)
          err_file=$(mktemp)
          # Capture stderr to a separate file (NOT /dev/null) so curl
          # diagnostics survive for the failure message. Use
          # `|| http_status="curl-failed"` to convert non-zero exit
          # into a sentinel without aborting the step.
          http_status=$(curl -sS -X POST https://demo.lightningenable.com/api/demo-refill \
            -H "Authorization: Bearer $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --write-out '%{http_code}' \
            --output "$body_file" \
            2>"$err_file") || http_status="curl-failed"

          body=$(cat "$body_file")
          curl_err=$(cat "$err_file")
          rm -f "$body_file" "$err_file"

          echo "HTTP status: ${http_status}"
          echo "Body:"
          echo "$body" | jq . 2>/dev/null || echo "$body"

          if [ "$http_status" = "curl-failed" ]; then
            echo "::error::curl itself failed (DNS, TLS, max-time, etc.) — could not reach the refill endpoint. curl stderr: ${curl_err}"
            exit 1
          fi
          if [ "$http_status" != "200" ]; then
            error=$(echo "$body" | jq -r '.error // ""' 2>/dev/null || true)
            echo "::error::Refill failed (HTTP ${http_status}). ${error}"
            exit 1
          fi

          ok=$(echo "$body" | jq -r '.ok // false' 2>/dev/null || echo "false")
          if [ "$ok" != "true" ]; then
            echo "::error::Refill endpoint returned ok=false. See body above for details."
            exit 1
          fi

          # Graceful-skip path: ok:true with skipped:true means OpenNode
          # had insufficient balance (idle period — nothing to move).
          # Log and exit success without sending an alert.
          skipped=$(echo "$body" | jq -r '.skipped // false' 2>/dev/null || echo "false")
          if [ "$skipped" = "true" ]; then
            reason=$(echo "$body" | jq -r '.reason // ""' 2>/dev/null || true)
            echo "ℹ️  Refill skipped: ${reason}"
            exit 0
          fi

          refillSats=$(echo "$body" | jq -r '.refillSats // "?"' 2>/dev/null || echo "?")
          withdrawalId=$(echo "$body" | jq -r '.withdrawal.id // "?"' 2>/dev/null || echo "?")
          status=$(echo "$body" | jq -r '.withdrawal.status // "?"' 2>/dev/null || echo "?")
          echo "✅ Refill submitted: ${refillSats} sats → CoinOS (withdrawal id=${withdrawalId}, status=${status})"

      - name: Open / update tracking issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Plain-ASCII title so GitHub's issue-search tokenizer matches
          # consistently. The emoji is now in the body's first line for
          # the visual cue without confusing search.
          TITLE="Daily demo refill failed"
          # `// empty` keeps jq from emitting the literal "null" when no
          # match is found — otherwise [ -n "$existing" ] would treat
          # "null" as truthy and try to comment on a non-existent issue.
          existing=$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          # Build the body as a bash multi-line string. Earlier this
          # was a `cat <<EOF` heredoc, but the YAML `run: |` block
          # indents every line — and `<<EOF` (no dash) requires the
          # closing EOF marker at column 0 with no leading whitespace.
          # A multi-line "..." literal sidesteps the issue entirely
          # and reads more naturally inside the indented block.
          BODY="🚨 The daily demo refill (OpenNode → CoinOS) failed on $(date -u +%FT%TZ).

          **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Likely causes (in order of frequency):
          1. OPENNODE_WITHDRAWAL_API_KEY revoked, rotated, or wrong scope
          2. DEMO_REFILL_ADMIN_KEY mismatch (Vercel env var vs GitHub secret)
          3. CoinOS LNURL-pay endpoint down (transient — try \`workflow_dispatch\` rerun in a few min)
          4. Vercel function crashed — check Vercel logs for the demo-refill function
          5. OpenNode API base URL misconfigured (allowlist rejects it)

          Note: \"OpenNode balance too low\" is NOT in this list — that condition returns skipped:true and never fires this alert."

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
            # Apply the label on the existing issue too (idempotent).
            # If the label doesn't exist, ignore the failure — admin
            # can create the label later if they prefer.
            gh issue edit "$existing" --repo "${GITHUB_REPOSITORY}" --add-label "refill-failure" 2>/dev/null || true
            echo "Commented on existing issue #$existing"
          else
            gh issue create --repo "${GITHUB_REPOSITORY}" --title "$TITLE" --body "$BODY" --label "refill-failure" 2>/dev/null \
              || gh issue create --repo "${GITHUB_REPOSITORY}" --title "$TITLE" --body "$BODY"
            echo "Opened new issue"
          fi
